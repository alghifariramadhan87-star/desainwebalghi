<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #ffffff, #00e5ff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 400px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #555;
    }

    input[type="text"],
    input[type="password"],
    select,
    textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 14px;
        box-sizing: border-box;
        transition: 0.3s;
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: #6a74f7;
        outline: none;
        box-shadow: 0 0 5px rgba(106,116,247,0.4);
    }

    .inline-group {
        display: flex;
        gap: 15px;
        align-items: center;
        margin: 10px 0;
        font-size: 14px;
    }

    textarea {
        resize: vertical;
        min-height: 80px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #6a74f7, #4cafef);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }
</style>
</head>

<body>

<div class="container">
    <h2>Form Pendaftaran</h2>

    <form>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan password">
        </div>

        <div class="form-group">
            <label>Jenis Kelamin</label>
            <div class="inline-group">
                <input type="radio" id="pria" name="jeniskelamin">
                <label for="pria">Pria</label>

                <input type="radio" id="wanita" name="jeniskelamin">
                <label for="wanita">Wanita</label>
            </div>
        </div>

        <div class="form-group">
            <label>Hobi</label>
            <div class="inline-group">
                <input type="checkbox" id="menyanyi">
                <label for="menyanyi">Menyanyi</label>

                <input type="checkbox" id="olahraga">
                <label for="olahraga">Olahraga</label>

                <input type="checkbox" id="ngoding">
                <label for="ngoding">Ngoding</label>
            </div>
        </div>

        <div class="form-group">
            <label for="catatan">Alamat / Catatan</label>
            <textarea id="catatan" placeholder="Tulis sesuatu..."></textarea>
        </div>

        <div class="form-group">
            <label for="kota">Asal Kota</label>
            <select id="kota">
                <option disabled selected>Pilih kota</option>
                <option>Bandung</option>
                <option>Yogyakarta</option>
                <option>Jakarta</option>
            </select>
        </div>

        <button type="submit">Kirim</button>
    </form>
</div>

</body>
</html>
