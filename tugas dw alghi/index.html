<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Project Desain Web</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing-body">

    <div class="stars"></div>
    <div class="bg-blobs">
        <div class="blob" style="width: 50vw; height: 50vw; background: var(--accent-1); top: -10%; left: -10%;"></div>
        <div class="blob" style="width: 40vw; height: 40vw; background: var(--accent-3); bottom: -10%; right: -10%; animation-delay: -5s;"></div>
    </div>

    <div class="floating-orb" style="top: 20%; right: 10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 92, 246, 0.08), transparent 70%);"></div>
    <div class="floating-orb" style="bottom: 15%; left: 5%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(236, 72, 153, 0.06), transparent 70%); animation-delay: -4s;"></div>

    <div class="hero-wrapper">
        <div class="hero-box">
            <div class="badge">Universitas Putra Indonesia "YPTK"</div>
            <h1>Welcome To <br><span class="text-gradient">Directory ALFARA</span></h1>
            <p>Kumpulan project, tugas, dan materi kuliah Desain Web yang dirancang dengan animasi UI tingkat tinggi oleh <strong>Alghifari Ramadhan</strong>.</p>
            
            <a href="dashboard.html" class="c-link c-link-index" style="padding: 1rem 2.5rem; font-size: 1.05rem;">
                <span>Mulai Eksplorasi</span>
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                </svg>
            </a>
        </div>
    </div>

    <!-- Decorative floating particles -->
    <div class="particle-dot" style="top: 15%; left: 10%; animation-delay: 0s;"></div>
    <div class="particle-dot" style="top: 25%; right: 15%; animation-delay: 1s; background: rgba(236, 72, 153, 0.6);"></div>
    <div class="particle-dot" style="bottom: 20%; left: 20%; animation-delay: 2s; background: rgba(139, 92, 246, 0.6);"></div>
    <div class="particle-dot" style="bottom: 30%; right: 25%; animation-delay: 3s;"></div>
    <div class="particle-dot" style="top: 50%; left: 5%; animation-delay: 1.5s; background: rgba(245, 158, 11, 0.5);"></div>
    <div class="particle-dot" style="top: 70%; right: 8%; animation-delay: 2.5s; background: rgba(16, 185, 129, 0.5);"></div>
    <div class="particle-dot" style="top: 8%; right: 30%; animation-delay: 0.5s; background: rgba(14, 165, 233, 0.5); width: 3px; height: 3px;"></div>
    <div class="particle-dot" style="top: 40%; left: 15%; animation-delay: 3.5s; background: rgba(244, 63, 94, 0.5); width: 4px; height: 4px;"></div>
    <div class="particle-dot" style="bottom: 10%; right: 5%; animation-delay: 4s; width: 5px; height: 5px;"></div>
    <div class="particle-dot" style="bottom: 40%; left: 8%; animation-delay: 1.8s; background: rgba(59, 130, 246, 0.5); width: 3px; height: 3px;"></div>
    <!-- Aurora line effect -->
    <div class="aurora-line" style="top: 10%;"></div>
    <div class="aurora-line" style="bottom: 15%; animation-delay: 3s;"></div>
</body>
</html>
